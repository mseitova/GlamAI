services:
  db:
    image: postgres:16-alpine
    container_name: smile-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: smile
      POSTGRES_PASSWORD: smile
      POSTGRES_DB: smile
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smile -d smile"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: smile-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://smile:smile@db:5432/smile
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY in .env}
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
